name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Validate tag format
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
              Write-Host "Invalid tag format: $tag" -ForegroundColor Red
              Write-Host "Expected format: v0.0.0" -ForegroundColor Yellow
              exit 1
          }
          Write-Host "Valid tag: $tag" -ForegroundColor Green

      - name: Verify version consistency
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.Substring(1)  # Remove 'v' prefix

          # Check Cargo.toml version
          $cargoToml = Get-Content "Cargo.toml" -Raw
          if ($cargoToml -match 'version\s*=\s*"([^"]+)"') {
              $cargoVersion = $Matches[1]
              if ($cargoVersion -ne $version) {
                  Write-Host "Version mismatch!" -ForegroundColor Red
                  Write-Host "Tag version: $version" -ForegroundColor Yellow
                  Write-Host "Cargo.toml version: $cargoVersion" -ForegroundColor Yellow
                  exit 1
              }
              Write-Host "Cargo.toml version matches: $cargoVersion" -ForegroundColor Green
          } else {
              Write-Host "Could not parse version from Cargo.toml" -ForegroundColor Red
              exit 1
          }

          # Check CHANGELOG.md has entry
          $changelog = Get-Content "CHANGELOG.md" -Raw
          if ($changelog -notmatch "\[$version\]") {
              Write-Host "CHANGELOG.md missing entry for version $version" -ForegroundColor Red
              exit 1
          }
          Write-Host "CHANGELOG.md has entry for $version" -ForegroundColor Green

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc
          targets: i686-pc-windows-msvc

      - name: Install Pixi
        shell: pwsh
        # We use pixi only as a task runner (no conda dependencies in
        # pixi.toml). prefix-dev/setup-pixi runs `pixi list --locked`
        # post-install as a smoke test and treats an empty environment
        # as a failure, so we install the binary directly instead.
        # Pin a specific version so transient GitHub-releases blips on
        # the "latest" alias don't break CI - bump as needed.
        env:
          PIXI_VERSION: v0.67.0
        run: |
          iwr -useb https://pixi.sh/install.ps1 | iex
          echo "$env:USERPROFILE\.pixi\bin" >> $env:GITHUB_PATH

      - name: Cache Cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run release validation
        run: pixi run validate-release

      - name: Build release
        run: pixi run build-release

      - name: Create package
        run: pixi run package

      - name: Extract changelog section
        id: changelog
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.Substring(1)
          $changelog = Get-Content "CHANGELOG.md" -Raw

          # Extract the section for this version
          if ($changelog -match "## \[$version\][^\n]*\n(.*?)(?=\n## \[|$)") {
              $notes = $Matches[1].Trim()
              # Escape for GitHub Actions
              $notes = $notes -replace '%', '%25'
              $notes = $notes -replace "`n", '%0A'
              $notes = $notes -replace "`r", '%0D'
              echo "notes=$notes" >> $env:GITHUB_OUTPUT
          } else {
              echo "notes=Release $version" >> $env:GITHUB_OUTPUT
          }

      - name: Find package ZIPs
        id: package
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "release" -Filter "BioshockRemasteredHeadTracking-v*-installer.zip" | Select-Object -First 1
          $nexus = Get-ChildItem -Path "release" -Filter "BioshockRemasteredHeadTracking-v*-nexus.zip" | Select-Object -First 1
          if (-not $installer -or -not $nexus) {
              Write-Host "Expected installer + nexus ZIPs in release/ - not found." -ForegroundColor Red
              exit 1
          }
          echo "installer=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          echo "nexus=$($nexus.FullName)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BioShock Remastered Head Tracking ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          files: |
            ${{ steps.package.outputs.installer }}
            ${{ steps.package.outputs.nexus }}
          fail_on_unmatched_files: true
